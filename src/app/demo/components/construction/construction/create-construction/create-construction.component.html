<div class="grid">
	<div class="col-12">
		<div class="card">

			<div class="flex flex-column sm:flex-row align-items-center gap-4 mb-3">
				<div class="text-900 text-xl font-semibold">Nova Obra</div>
				<div class="flex gap-2 sm:ml-auto">
					<button class="p-button-rounded p-button-outlined" (click)="back()" icon="pi pi-arrow-left" pButton
						pTooltip="Voltar" tooltipPosition="bottom" type="button"></button>
					<button class="p-button-rounded bg-red-500 border-red-500 hover:shadow-8" icon="pi pi-trash" pButton
						pTooltip="Apagar" tooltipPosition="bottom" type="button"></button>
					<button class="p-button-rounded" (click)="newConstruction()" icon="pi pi-save" label="Guardar"
						pButton tooltipPosition="bottom" type="button"></button>
				</div>
			</div>

			<div class="p-fluid p-formgrid grid">

				<div class="field col-12 md:col-4">
					<label>Nome</label>
					<input type="text" pInputText [(ngModel)]="name" />
				</div>

				<div class="field col-12 md:col-4">
					<label>Local</label>
					<input type="text" pInputText [(ngModel)]="local" />
				</div>

				<div class="field col-12 md:col-4">
					<label>Cliente</label>
					<p-dropdown [(ngModel)]="selectedClient" [options]="clientNames" optionLabel="name" optionValue="id"
						placeholder="Selecione um Cliente" [ngClass]="{ 'ng-dirty ng-invalid': !selectedClient }" />
				</div>

				<div class="field col-12 md:col-4">
					<label>Data de Ajudicação</label>
					<p-calendar [(ngModel)]="adjudicationDate" [iconDisplay]="'input'" [showIcon]="true"
						inputId="icondisplay" dateFormat="dd/mm/yy" />
				</div>

				<div class="field col-12 md:col-3">
					<label>Distância</label>
					<p-inputNumber [(ngModel)]="distance" mode="decimal" [minFractionDigits]="1" [maxFractionDigits]="2"
						suffix=" km" />
				</div>

				<div class="field col-12 md:col-2">
					<label>Imagem</label>
					<p-fileUpload mode="basic" chooseLabel="Escolher" chooseIcon="pi pi-upload" name="demo[]"
						url="https://www.primefaces.org/cdn/api/upload.php" accept="image/*" />
				</div>

				<div class="field col-12 md:col-2">
					<label>Items do Orçamento</label>
					<p-button class="mr-2 w-100" label="Adicionar" icon="pi pi-plus" (click)="addInput()" />
				</div>

			</div>


			<form [formGroup]="dynamicForm">
				<p-table [value]="inputs.controls">
					<ng-template pTemplate="header">
						<tr>
							<th>Novo Item</th>
							<th>Nome Item</th>
							<th>Quantidade</th>
							<th>Unidade</th>
							<th>Valor</th>
							<th>Ações</th>
						</tr>
					</ng-template>
					<ng-template pTemplate="body" let-inputGroup let-rowIndex="rowIndex">
						<!-- Main row -->
						<tr [formGroup]="asFormGroup(inputGroup)">
							<td>
								<p-button severity="info" icon="pi pi-plus" (click)="addInput()"></p-button>
							</td>
							<td>
								<input type="text" pInputText formControlName="name" placeholder="Nome do Item" />
							</td>
							<td>
								<p-inputNumber mode="decimal" formControlName="quantity" [minFractionDigits]="2" 
    [maxFractionDigits]="5"></p-inputNumber>
							</td>
							<td>
								<p-dropdown formControlName="unit" [options]="units | keyvalue" optionLabel="value"
									optionValue="key" placeholder="Selecione uma Unidade" appendTo="body" />

							</td>
							<td>
								<p-inputNumber formControlName="value" mode="currency" currency="EUR"
									locale="de-DE"></p-inputNumber>

							</td>
							<td>
								<p-button severity="info" icon="pi pi-plus" (click)="addSubInput(rowIndex)"></p-button>
								<p-button severity="danger" icon="pi pi-trash"
									(click)="removeInput(rowIndex)"></p-button>
							</td>
						</tr>

						<!-- Sub-items row -->
						<tr *ngIf="getSubInputs(rowIndex).length > 0">
							<td></td>
							<td colspan="3">
								<p-table [value]="getSubInputs(rowIndex).controls">
									<ng-template pTemplate="header">
						<tr>
							<th>Nome Sub-Item</th>
							<th>Quantidade</th>
							<th>Unidade</th>
							<th>Valor</th>
							<th>Ações</th>
						</tr>
					</ng-template>
					<ng-template pTemplate="body" let-subGroup let-subIndex="subIndex">
						<tr [formGroup]="asFormGroup(subGroup)">
							<td>
								<input type="text" pInputText formControlName="subName"
									placeholder="Nome do Sub-Item" />
							</td>
							<td>
								<p-inputNumber formControlName="subQuantity" [minFractionDigits]="2" 
    [maxFractionDigits]="5" mode="decimal"></p-inputNumber>
							</td>
							<td>
								<p-dropdown formControlName="subUnit" [options]="units | keyvalue" optionLabel="value"
									optionValue="key" placeholder="Selecione uma Unidade" appendTo="body" />
							</td>
							<td>
								<p-inputNumber formControlName="subValue" mode="currency" currency="EUR"
									locale="de-DE"></p-inputNumber>
							</td>
							<td>
								<p-button severity="danger" icon="pi pi-trash"
									(click)="removeSubInput(rowIndex, subIndex)"></p-button>
							</td>
						</tr>
					</ng-template>
				</p-table>
				</td>
				</tr>
				</ng-template>
				</p-table>
			</form>

		</div>
	</div>
</div>

<p-toast />

<div class="grid">
	<div class="col-12">
		<div class="card">

            <div class="flex flex-column sm:flex-row align-items-center gap-4 mb-3">
                <div class="text-900 text-xl font-semibold">Funcionários</div>
                <div class="flex gap-2 sm:ml-auto">
                    <button 
                        class="p-button-rounded p-button-outlined"
                        (click)="newEmployee()" 
                        icon="pi pi-plus" 
                        label="Novo"
                        pButton 
                        type="button" 
                    ></button>
                    <button 
                        class="p-button-rounded"
                        icon="pi pi-download" 
                        pTooltip="Exportar" 
                        tooltipPosition="bottom" 
                        pButton 
                        type="button" 
                    ></button>
                </div>
            </div>

			<p-table 
                currentPageReportTemplate="{first} de {last} de {totalRecords} funcionários"
                [lazy]="true"
                [loading]="loading"
                (onLazyLoad)="nextPage($event)"
                [paginator]="true"
                [rows]="5"
                [rowsPerPageOptions]="[5, 10, 20]"
                [showCurrentPageReport]="true"
                styleClass="p-datatable-striped" 
                [totalRecords]="totalRecords"
                [tableStyle]="{ 'min-width': '50rem' }"
                [value]="employees"
            >

                <ng-template pTemplate = "header">
                    <tr>
                        <th pSortableColumn = "name">Nome <p-sortIcon field = "name"></p-sortIcon></th>
                        <th>Vencimento Base</th>
                        <th>Ajudas de Custo</th>
                        <th>Subsídio de Alimentação</th>
                        <th>Seguro de Saúde</th>
                        <th>Ações</th>
                    </tr>
                </ng-template>

                <ng-template pTemplate = "body" let-employee>
                    <tr>
                        <td>{{ employee.name }}</td>
                        <td>{{ employee.baseSalary | currency: 'EUR' }}</td>
                        <td>{{ employee.allowance | currency: 'EUR' }}</td>
                        <td>{{ employee.foodAllowance | currency: 'EUR' }}</td>
                        <td>{{ employee.healthInsurance | currency: 'EUR' }}</td>
                        <td>
                            <p-button 
                                pRipple 
                                icon="pi pi-pencil" 
                                class="mr-2" 
                                [rounded]="true" 
                                [text]="true" 
                                severity="success" 
                            />
                            <p-button 
                                pRipple 
                                icon="pi pi-trash" 
                                severity="danger" 
                                [rounded]="true" 
                                [text]="true" 
                            />
                        </td>
                    </tr>
                </ng-template>
                
            </p-table>

		</div>
	</div>
</div>

<div class="grid">
	<div class="col-12">
		<div class="card">

            <div class="flex flex-column sm:flex-row align-items-center gap-4 mb-3">
                <div class="text-900 text-xl font-semibold">Pagamentos</div>
                <div class="flex gap-2 sm:ml-auto">
                    <button 
                        class="p-button-rounded p-button-outlined"
                        (click)="newPayment()" 
                        icon="pi pi-plus" 
                        label="Novo"
                        pButton 
                        type="button" 
                    ></button>
                    <button 
                        class="p-button-rounded"
                        icon="pi pi-download" 
                        pTooltip="Exportar" 
                        tooltipPosition="bottom" 
                        pButton 
                        type="button" 
                    ></button>
                </div>
            </div>

			<p-table 
                currentPageReportTemplate="{first} de {last} de {totalRecords} pagamentos totais"
                [lazy]="true"
                [loading]="loading"
                (onLazyLoad)="nextPage($event)"
                [paginator]="true"
                [rows]="5"
                [rowsPerPageOptions]="[5, 10, 20]"
                styleClass="p-datatable-striped" 
                [showCurrentPageReport]="true"
                [totalRecords]="totalRecords"
                [tableStyle]="{ 'min-width': '50rem' }"
                [value]="payments"
            >

                <ng-template pTemplate="header">
                    <tr>
                        <th>Data</th>
                        <th>Número de Documento</th>
                        <th>Valor Pago</th>
                        <th>Método de Pagamento</th>
                        <th>Conta</th>
                        <th>Ações</th>
                    </tr>
                </ng-template>

                <ng-template pTemplate="body" let-payment>
                    <tr>
                        <td>{{ payment.date | date: 'dd/MM/yyyy' }}</td>
                        <td>{{ payment.documentNumber }}</td>
                        <td class="text-red-500 font-semibold">- {{ payment.value | currency: 'EUR' }}</td>
                        <td><span [class]="'payment-badge status-' + payment.paymentMethod.toLowerCase()">{{ PaymentMethod[payment.paymentMethod] }}</span></td>
                        <td>{{ payment.account }}</td>
                        <td>
                            <p-button 
                                pRipple 
                                icon="pi pi-pencil" 
                                class="mr-2" 
                                [rounded]="true" 
                                [text]="true" 
                                severity="success" 
                            />
                            <p-button 
                                pRipple 
                                icon="pi pi-trash" 
                                severity="danger" 
                                [rounded]="true" 
                                [text]="true" 
                            />
                        </td>
                    </tr>
                </ng-template>
                
            </p-table>

		</div>
	</div>
</div>

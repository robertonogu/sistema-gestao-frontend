<div class="grid">
	<div class="col-12">
		<div class="card">

			<div class="flex flex-column sm:flex-row align-items-center gap-4 mb-3">
				<div class="text-900 text-xl font-semibold">Novo Movimento</div>
				<div class="flex gap-2 sm:ml-auto">
                    <button 
						class="p-button-rounded p-button-outlined"
						(click)="back()" 
						icon="pi pi-arrow-left" 
						pButton 
						pTooltip="Voltar" 
						tooltipPosition="bottom" 
						type="button" 
					></button>
					<button 
						class="p-button-rounded bg-red-500 border-red-500"
						icon="pi pi-trash" 
						pButton 
						pTooltip="Apagar" 
						tooltipPosition="bottom" 
						type="button" 
					></button>
					<button 
						class="p-button-rounded"
						(click)="newMovement()" 
						icon="pi pi-save" 
						label="Guardar" 
						pButton 
						tooltipPosition="bottom" 
						type="button" 
					></button>
                </div>
            </div>

			<div class="p-fluid p-formgrid grid">

				<div class="field col-12 md:col-6">
                    <label>Data</label>
					<p-calendar 
						[(ngModel)]="date"
                        dateFormat="dd/mm/yy"
                        [iconDisplay]="'input'" 
                        [showIcon]="true" 
                        inputId="icondisplay" 
						[ngClass]="{ 'ng-dirty ng-invalid': !date }"
                    />
				</div>

                <div class="field col-12 md:col-6">
					<label>Valor</label>
					<p-inputNumber 
						[(ngModel)]="value"
                        mode="currency"
                        inputId="currency-germany"
                        currency="EUR" 
                        locale="de-DE" 
						[ngClass]="{ 'ng-dirty ng-invalid': !value }"
                        autocomplete="off"
					/> 
				</div>

				<div class="field col-12 md:col-6">
					<label>De</label>
					<p-dropdown 
						[(ngModel)]="selectedOriginAccount"
                        [options]="accountNames" 
                        optionLabel="name" 
						optionValue="objectId"
                        placeholder="Selecione uma Conta" 
						[ngClass]="{ 'ng-dirty ng-invalid': !selectedOriginAccount }"
					/>
				</div>

				<div class="field col-12 md:col-6">
					<label>Para</label>
					<p-dropdown 
						[(ngModel)]="selectedTargetAccount"
                        [options]="accountNames" 
                        optionLabel="name" 
						optionValue="objectId"
                        placeholder="Selecione uma Conta" 
						[ngClass]="{ 'ng-dirty ng-invalid': !selectedTargetAccount }"
					/>
				</div>

			</div>
		</div>
	</div>
</div>

<p-toast />

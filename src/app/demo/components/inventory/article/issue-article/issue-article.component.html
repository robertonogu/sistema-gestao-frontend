<div class="grid">
	<div class="col-12">
		<div class="card">

			<div class="flex flex-column sm:flex-row align-items-center gap-4 mb-3">
				<div class="text-900 text-xl font-semibold">Emitir Artigo</div>
				<div class="flex gap-2 sm:ml-auto">
                    <button 
						class="p-button-rounded p-button-outlined"
						(click)="back()" 
						icon="pi pi-arrow-left" 
						pButton 
						pTooltip="Voltar" 
						tooltipPosition="bottom" 
						type="button" 
					></button>
					<button 
						class="p-button-rounded bg-red-500 border-red-500"
						icon="pi pi-trash" 
						pButton 
						pTooltip="Apagar" 
						tooltipPosition="bottom" 
						type="button" 
					></button>
					<button 
						class="p-button-rounded"
						(click)="newIssueArticle()" 
						icon="pi pi-save" 
						label="Guardar" 
						pButton 
						tooltipPosition="bottom" 
						type="button" 
					></button>
                </div>
            </div>

			<div class="p-fluid p-formgrid grid mt-3">

				<div class="field col-12 md:col-4">
                    <label>Data</label>
					<p-calendar 
						[(ngModel)]="date"
						dateFormat="dd/mm/yy"
                        [iconDisplay]="'input'" 
                        [showIcon]="true" 
                        inputId="icondisplay" 
                    />
				</div>
				
                <div class="field col-12 md:col-4">
					<label>Obra</label>
					<p-dropdown 
                        (onChange)="getSubItems()"
						[(ngModel)]="selectedConstruction"
                        [options]="constructionNames" 
                        optionLabel="name" 
						optionValue="constructionId"
                        placeholder="Selecione uma Obra" 
						[ngClass]="{ 'ng-dirty ng-invalid': !selectedConstruction }"
					/>
				</div>

                <div class="field col-12 md:col-4">
					<label>Sub-Item</label>
					<p-dropdown 
						[(ngModel)]="selectedSubItem"
                        [options]="subItems" 
                        optionLabel="name" 
						optionValue="id"
                        placeholder="Selecione uma Sub Item" 
						[ngClass]="{ 'ng-dirty ng-invalid': !selectedSubItem }"
					/>
				</div>

				<p-table 
					[value]="articles" 
					class="col-12" 
					styleClass="p-datatable-striped" 
				>

					<ng-template pTemplate="caption">
						<div class="flex align-items-center justify-content-between">
							Artigos
						</div>
					</ng-template>

					<ng-template pTemplate="header">
						<tr class="border-left-3 border-solid border-primary">
							<th>Código</th>
							<th>Nome</th>
							<th>Unidade</th>
							<th>Quantidade em Stock</th>
							<th>Quantidade a Sair</th>
						</tr>
					</ng-template>

					<ng-template pTemplate="body" let-article let-i="rowIndex">
						<tr>
							<td class=font-bold>{{ article.code }}</td>
							<td>{{ article.name }}</td>
							<td>{{ article.unit }}</td>
							<td>{{ article.quantity }}</td>
							<td>
								<p-inputNumber
                                    [(ngModel)]="articleQuantities[i]"
                                    mode="decimal" 
                                    [maxFractionDigits]="2"
									placeholder="Insira quantidade"
								/>
							</td>
						</tr>
					</ng-template>
                
            	</p-table>

			</div>
		</div>
	</div>
</div>

<p-toast />
